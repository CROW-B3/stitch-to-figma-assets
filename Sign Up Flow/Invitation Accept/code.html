<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Accept Invitation - New User</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#7c3aed", 
                        primary_hover: "#8b5cf6", 
                        "background-dark": "#030005", 
                        "surface-dark": "#0a0a0f",
                    },
                    fontFamily: {
                        display: ["Inter", "sans-serif"],
                        sans: ["Inter", "sans-serif"],
                        mono: ["ui-monospace", "SFMono-Regular", "Menlo", "Monaco", "Consolas", "Liberation Mono", "Courier New", "monospace"],
                    },
                    borderRadius: {
                        DEFAULT: "0.5rem",
                        'pill': "9999px",
                    },
                    boxShadow: {
                        'glow': '0 0 25px -5px rgba(124, 58, 237, 0.4)',
                        'glow-hover': '0 0 35px -5px rgba(124, 58, 237, 0.6)',
                        'card-glow': '0 0 40px -10px rgba(124, 58, 237, 0.15)',
                    }
                },
            },
        };
    </script>
<style type="text/tailwindcss">
        @layer utilities {
            .text-glow {
                text-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
            }
        }
    </style>
</head>
<body class="bg-background-dark text-gray-100 h-screen flex flex-col antialiased selection:bg-violet-500/30 selection:text-violet-200 overflow-hidden relative font-sans">
<div class="fixed inset-0 pointer-events-none z-0">
<div class="absolute inset-0 bg-[#030005]"></div>
<div class="absolute top-0 right-0 h-full w-[60vw] bg-gradient-to-l from-[#1e1035] via-[#0a0515] to-transparent opacity-60"></div>
<div class="absolute top-1/2 right-[-10%] -translate-y-1/2 w-[50vw] h-[50vw] bg-violet-900/20 rounded-full blur-[120px] mix-blend-screen"></div>
<div class="absolute inset-0 opacity-[0.07] mix-blend-overlay" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBM9186nC0yZUNVUFQsJmJQknRzzd1AwL2I3qQuyt9v_TttYmsBObFae2tLBX02-ov1BYd6VcUw3Z6iiuB-b5QD-XrPY-_EOVG5eVTIPDNyFj4zZnUby6pJpUD8Yd1cV1qh1-Bz3kJ9jdffI4u-z-FYs5ExGr0v5Vjb2ORDUkKgMhxZduaD_ivZOQdfz9wmQD5WiW-mS98RHYrDsVS87PEOUqpfM1V_j_4cDoEI7MKJqvjs4zghP_QIMO3L6NVd7zST_F2DmWNPoHE');"></div>
<div class="absolute inset-0 bg-[radial-gradient(circle_at_center,transparent_0%,rgba(3,0,5,0.4)_100%)]"></div>
</div>
<nav class="w-full flex justify-between items-center px-6 py-6 z-10 relative max-w-7xl mx-auto shrink-0">
<div class="flex items-center gap-3">
<div class="w-6 h-6 relative flex items-center justify-center">
<svg class="text-violet-500" fill="none" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg">
<path d="M13 2L3 14H12L11 22L21 10H12L13 2Z" fill="currentColor" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="0"></path>
</svg>
</div>
<span class="font-semibold text-lg tracking-wide text-white">CROW</span>
</div>
<div class="flex items-center gap-4 text-sm">
<a class="text-gray-500 hover:text-white transition-colors font-medium text-xs sm:text-sm" href="#">
                Need help? Contact support
            </a>
</div>
</nav>
<main class="flex-grow flex flex-col items-center justify-center relative z-10 w-full px-6 pb-6 max-w-7xl mx-auto h-full overflow-hidden">
<div class="w-full max-w-[440px] flex flex-col justify-center">
<div class="w-full flex flex-col items-center text-center mb-8 shrink-0">
<span class="text-[10px] font-bold tracking-[0.2em] text-violet-400 uppercase mb-3">INVITATION</span>
<h1 class="text-2xl md:text-3xl font-semibold text-white mb-2 tracking-tight text-glow leading-tight">
                    You’ve been invited to join CROW.
                </h1>
<p class="text-gray-400 text-sm leading-tight">
                    Accept to join the organization workspace.
                </p>
</div>
<div class="bg-white/[0.03] backdrop-blur-sm border border-white/10 rounded-2xl p-4 mb-6 text-sm shadow-card-glow">
<div class="flex justify-between items-center mb-3 last:mb-0 border-b border-white/5 pb-3 last:border-0 last:pb-0">
<span class="text-gray-500 text-xs uppercase tracking-wide font-medium">Organization</span>
<span class="text-gray-200 font-medium">Global Retail Ops</span>
</div>
<div class="flex justify-between items-center mb-3 last:mb-0 border-b border-white/5 pb-3 last:border-0 last:pb-0">
<span class="text-gray-500 text-xs uppercase tracking-wide font-medium">Role</span>
<div class="flex items-center gap-1.5">
<span class="text-violet-300 font-medium bg-violet-500/10 px-2 py-0.5 rounded text-xs border border-violet-500/20">Analyst</span>
</div>
</div>
<div class="flex justify-between items-center">
<span class="text-gray-500 text-xs uppercase tracking-wide font-medium">Email</span>
<span class="text-gray-200 font-medium">name@company.com</span>
</div>
</div>
<div class="space-y-4 mb-8">
<div class="space-y-1.5">
<label class="text-xs font-medium text-gray-300 ml-1">Full name</label>
<input class="w-full bg-white/5 border border-white/10 rounded-full px-4 py-2.5 text-sm text-gray-200 placeholder:text-gray-600 focus:outline-none focus:border-violet-500/50 focus:ring-1 focus:ring-violet-500/50 transition-all shadow-inner hover:bg-white/[0.07]" placeholder="Your name" type="text"/>
</div>
<div class="space-y-1.5">
<label class="text-xs font-medium text-gray-300 ml-1">Create password</label>
<div class="relative group">
<input class="w-full bg-white/5 border border-white/10 rounded-full px-4 py-2.5 text-sm text-gray-200 placeholder:text-gray-600 focus:outline-none focus:border-violet-500/50 focus:ring-1 focus:ring-violet-500/50 transition-all shadow-inner hover:bg-white/[0.07]" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 flex items-center px-4 text-gray-500 hover:text-violet-400 focus:outline-none transition-colors">
<span class="material-symbols-outlined text-[18px]">visibility</span>
</button>
</div>
</div>
</div>
<div class="space-y-3">
<button class="w-full bg-primary hover:bg-primary_hover text-white text-sm font-medium px-4 py-3 rounded-full transition-all shadow-glow hover:shadow-glow-hover disabled:opacity-50 disabled:cursor-not-allowed">
                    Accept invitation
                </button>
<button class="w-full bg-transparent border border-white/10 hover:border-white/20 text-gray-400 hover:text-white text-sm font-medium px-4 py-3 rounded-full transition-all">
                    Decline
                </button>
</div>
<div class="mt-5 text-center flex flex-col items-center gap-3">
<a class="text-xs text-gray-500 hover:text-violet-400 transition-colors font-medium" href="#">Sign in instead</a>
<p class="text-[11px] text-gray-600">
                    By accepting, you’ll be added to the organization workspace.
                </p>
</div>
</div>
</main>

</body></html>
