<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Create Organization - CROW</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#7c3aed", // Violet-600
                        primary_hover: "#8b5cf6", // Violet-500
                        "background-dark": "#030005", // Deepest black
                        "surface-dark": "#0a0a0f",
                    },
                    fontFamily: {
                        display: ["Inter", "sans-serif"],
                        sans: ["Inter", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "0.5rem",
                        'pill': "9999px",
                    },
                    boxShadow: {
                        'glow': '0 0 25px -5px rgba(124, 58, 237, 0.4)',
                        'glow-hover': '0 0 35px -5px rgba(124, 58, 237, 0.6)',
                    }
                },
            },
        };
    </script>
<style type="text/tailwindcss">
        @layer utilities {
            .text-glow {
                text-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
            }
        }::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #030005; 
        }
        ::-webkit-scrollbar-thumb {
            background: #333; 
            border-radius: 3px;
        }.custom-checkbox {
            appearance: none;
            background-color: rgba(255, 255, 255, 0.05);
            margin: 0;
            font: inherit;
            color: currentColor;
            width: 1.15em;
            height: 1.15em;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 0.25em;
            display: grid;
            place-content: center;
            transition: all 0.2s ease-in-out;
            cursor: pointer;
        }
        .custom-checkbox::before {
            content: "";
            width: 0.65em;
            height: 0.65em;
            transform: scale(0);
            transition: 120ms transform ease-in-out;
            box-shadow: inset 1em 1em white;
            transform-origin: center;
            clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
        }
        .custom-checkbox:checked {
            background-color: #7c3aed;
            border-color: #7c3aed;
        }
        .custom-checkbox:checked::before {
            transform: scale(1);
        }
    </style>
</head>
<body class="bg-background-dark text-gray-100 min-h-screen flex flex-col antialiased selection:bg-violet-500/30 selection:text-violet-200 overflow-x-hidden relative">
<div class="fixed inset-0 pointer-events-none z-0">
<div class="absolute inset-0 bg-[#030005]"></div>
<div class="absolute top-0 right-0 h-full w-[60vw] bg-gradient-to-l from-[#1e1035] via-[#0a0515] to-transparent opacity-60"></div>
<div class="absolute top-1/2 right-[-10%] -translate-y-1/2 w-[50vw] h-[50vw] bg-violet-900/20 rounded-full blur-[120px] mix-blend-screen"></div>
<div class="absolute inset-0 opacity-[0.07] mix-blend-overlay" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBM9186nC0yZUNVUFQsJmJQknRzzd1AwL2I3qQuyt9v_TttYmsBObFae2tLBX02-ov1BYd6VcUw3Z6iiuB-b5QD-XrPY-_EOVG5eVTIPDNyFj4zZnUby6pJpUD8Yd1cV1qh1-Bz3kJ9jdffI4u-z-FYs5ExGr0v5Vjb2ORDUkKgMhxZduaD_ivZOQdfz9wmQD5WiW-mS98RHYrDsVS87PEOUqpfM1V_j_4cDoEI7MKJqvjs4zghP_QIMO3L6NVd7zST_F2DmWNPoHE');"></div>
<div class="absolute inset-0 bg-[radial-gradient(circle_at_center,transparent_0%,rgba(3,0,5,0.4)_100%)]"></div>
</div>
<nav class="w-full flex justify-between items-center px-6 py-8 z-10 relative max-w-7xl mx-auto">
<div class="flex items-center gap-3">
<div class="w-6 h-6 relative flex items-center justify-center">
<svg class="text-violet-500" fill="none" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg">
<path d="M13 2L3 14H12L11 22L21 10H12L13 2Z" fill="currentColor" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="0"></path>
</svg>
</div>
<span class="font-semibold text-lg tracking-wide text-white">CROW</span>
</div>
<div class="flex items-center gap-4 text-sm">
<span class="text-gray-500 hidden sm:inline-block">Have an account?</span>
<a class="px-5 py-2.5 rounded-full border border-white/10 text-gray-300 hover:bg-white/5 hover:border-white/20 transition-all duration-200 font-medium text-xs sm:text-sm" href="#">
                Sign in
            </a>
</div>
</nav>
<main class="flex-grow flex items-center justify-center relative z-10 w-full px-4 py-8">
<div class="w-full max-w-[400px] flex flex-col items-center text-center">
<div class="mb-8 flex flex-col items-center animate-fade-in">
<span class="text-violet-400 text-[10px] font-bold tracking-[0.2em] uppercase mb-4">SIGN UP</span>
<h1 class="text-3xl md:text-3xl font-semibold text-white mb-3 tracking-tight text-glow">
                    Create your organization
                </h1>
<p class="text-gray-500 text-sm max-w-xs mx-auto leading-relaxed">
                    Start unifying Web, CCTV, and Social signals into one interaction model.
                </p>
<div class="w-10 h-0.5 bg-gradient-to-r from-violet-600 to-purple-900 rounded-full mt-6 opacity-80"></div>
</div>
<form class="w-full space-y-4" onsubmit="event.preventDefault();">
<div class="space-y-4">
<div class="group relative">
<input autocomplete="organization" class="w-full bg-white/[0.02] border border-white/10 rounded-full px-5 py-3 text-sm text-gray-200 placeholder-gray-600 focus:outline-none focus:border-violet-500/50 focus:ring-1 focus:ring-violet-500/50 focus:bg-white/[0.04] transition-all duration-300 shadow-inner" id="org_name" placeholder="Acme Retail" required="" type="text"/>
</div>
<div class="group relative">
<input autocomplete="name" class="w-full bg-white/[0.02] border border-white/10 rounded-full px-5 py-3 text-sm text-gray-200 placeholder-gray-600 focus:outline-none focus:border-violet-500/50 focus:ring-1 focus:ring-violet-500/50 focus:bg-white/[0.04] transition-all duration-300 shadow-inner" id="full_name" placeholder="Your name" required="" type="text"/>
</div>
<div class="group relative">
<input autocomplete="email" class="w-full bg-white/[0.02] border border-white/10 rounded-full px-5 py-3 text-sm text-gray-200 placeholder-gray-600 focus:outline-none focus:border-violet-500/50 focus:ring-1 focus:ring-violet-500/50 focus:bg-white/[0.04] transition-all duration-300 shadow-inner" id="email" placeholder="name@company.com" required="" type="email"/>
</div>
<div class="group relative">
<input autocomplete="new-password" class="w-full bg-white/[0.02] border border-white/10 rounded-full pl-5 pr-12 py-3 text-sm text-gray-200 placeholder-gray-600 focus:outline-none focus:border-violet-500/50 focus:ring-1 focus:ring-violet-500/50 focus:bg-white/[0.04] transition-all duration-300 shadow-inner" id="password" placeholder="••••••••••" required="" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300 focus:outline-none" type="button">
<span class="material-symbols-outlined text-[18px]">visibility</span>
</button>
</div>
<div class="group relative">
<input autocomplete="new-password" class="w-full bg-white/[0.02] border border-white/10 rounded-full px-5 py-3 text-sm text-gray-200 placeholder-gray-600 focus:outline-none focus:border-violet-500/50 focus:ring-1 focus:ring-violet-500/50 focus:bg-white/[0.04] transition-all duration-300 shadow-inner" id="confirm_password" placeholder="••••••••••" required="" type="password"/>
</div>
</div>
<div class="flex flex-col gap-2 pt-1 px-1 text-left w-full">
<div class="flex items-center gap-3">
<input class="custom-checkbox" id="terms" type="checkbox"/>
<label class="text-xs text-gray-400 select-none cursor-pointer" for="terms">
                        I agree to Terms and Privacy
                    </label>
</div>
<p class="text-[11px] text-gray-500 pl-0.5">
                    Use a work email for team access.
                </p>
</div>
<button class="w-full bg-primary hover:bg-primary_hover text-white font-medium py-3 rounded-full transition-all duration-300 shadow-glow hover:shadow-glow-hover flex items-center justify-center gap-2 group mt-2" type="submit">
<span>Create organization</span>
<span class="group-hover:translate-x-1 transition-transform">→</span>
</button>
</form>
<div class="w-full flex items-center gap-4 my-6">
<div class="h-px bg-white/10 flex-1"></div>
<span class="text-[10px] uppercase tracking-wider text-gray-500 font-medium">or</span>
<div class="h-px bg-white/10 flex-1"></div>
</div>
<button class="w-full bg-transparent border border-white/10 hover:bg-white/5 hover:border-white/20 text-gray-300 font-medium py-3 rounded-full transition-all duration-300 flex items-center justify-center gap-3 group text-sm">
<svg class="w-4 h-4" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span>Continue with Google</span>
</button>
</div>
</main>
<footer class="w-full py-8 text-center z-10 relative">
<div class="flex flex-col gap-2">
<a class="text-xs text-gray-400 hover:text-white transition-colors mb-2" href="#">
            Have an invite? <span class="text-violet-400 hover:text-violet-300">Accept invitation</span>
</a>
<p class="text-[10px] text-gray-600 max-w-sm mx-auto leading-relaxed">
            By creating an account, you agree to <a class="hover:text-gray-400 underline decoration-gray-800 underline-offset-2 transition-colors" href="#">Terms</a> and <a class="hover:text-gray-400 underline decoration-gray-800 underline-offset-2 transition-colors" href="#">Privacy</a>.
        </p>
</div>
</footer>
</body></html>
